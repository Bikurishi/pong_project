<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Pong: Soul Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="stats-bar">
            <div class="score" style="color: var(--neon-blue)" id="p-score">0</div>
            <div id="level-info">
                <div id="level-display" style="color: var(--neon-green); font-weight: bold; text-transform: uppercase;">LEVEL 1</div>
                <div style="display: flex; gap: 8px; justify-content: center;">
                    <button class="pause-hint" onclick="togglePause()">press p to pause</button>
                    <span style="color:#444; font-size:0.7rem;">|</span>
                    <button class="pause-hint" style="color: var(--neon-pink)" onclick="toggleMuteMusic()" id="mute-btn">mute music</button>
                </div>
            </div>
            <div class="score" style="color: var(--neon-pink)" id="a-score">0</div>
        </div>

        <div id="boss-charge-bar"><div id="boss-charge-fill"></div></div>

        <div id="banner">
            <h1 id="banner-title" style="font-size: 3rem;">LEVEL UP</h1>
            <p id="banner-subtitle" style="color: var(--neon-yellow); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;"></p>
        </div>

        <!-- Ability slot layout swapped to match updated Phantom (Level 2) and Titan (Level 3) progression -->
        <div id="ability-bar">
            <div id="slot-0" class="ability-slot">
                <div id="fill-0" class="cooldown-fill"></div>
                <span style="z-index: 2">E</span>
                <small style="z-index: 2">DASH</small>
                <div id="cd-text-0" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 3; font-weight: bold; font-size: 0.85rem; color: var(--neon-yellow); display: none; background: rgba(0,0,0,0.75); align-items: center; justify-content: center;"></div>
            </div>
            <div id="slot-1" class="ability-slot">
                <div id="fill-1" class="cooldown-fill"></div>
                <span style="z-index: 2">Q</span>
                <small style="z-index: 2">BLINK</small>
                <div id="cd-text-1" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 3; font-weight: bold; font-size: 0.85rem; color: var(--neon-yellow); display: none; background: rgba(0,0,0,0.75); align-items: center; justify-content: center;"></div>
            </div>
            <div id="slot-2" class="ability-slot">
                <div id="fill-2" class="cooldown-fill"></div>
                <span style="z-index: 2">SPACE</span>
                <small style="z-index: 2">SHIELD</small>
                <div id="cd-text-2" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 3; font-weight: bold; font-size: 0.85rem; color: var(--neon-yellow); display: none; background: rgba(0,0,0,0.75); align-items: center; justify-content: center;"></div>
            </div>
            <div id="slot-3" class="ability-slot">
                <div id="fill-3" class="cooldown-fill"></div>
                <span style="z-index: 2">SHIFT</span>
                <small style="z-index: 2">CHRONO</small>
                <div id="cd-text-3" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 3; font-weight: bold; font-size: 0.85rem; color: var(--neon-yellow); display: none; background: rgba(0,0,0,0.75); align-items: center; justify-content: center;"></div>
            </div>
            <div id="slot-4" class="ability-slot">
                <div id="fill-4" class="cooldown-fill"></div>
                <span style="z-index: 2">?</span>
                <small style="z-index: 2">???</small>
                <div id="cd-text-4" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 3; font-weight: bold; font-size: 0.85rem; color: var(--neon-yellow); display: none; background: rgba(0,0,0,0.75); align-items: center; justify-content: center;"></div>
            </div>
        </div>

        <div id="start-screen" class="ui-overlay">
            <h1>SOUL PONG</h1>
            <p style="color: #888; margin-top: 10px; max-width: 400px; line-height: 1.5;">Defeat bosses to steal their powers.</p>
            
            <div style="margin-top: 20px;">
                <small style="color: #555; text-transform: uppercase; letter-spacing: 1px; font-weight: bold;">Select Your Opponent</small>
                <div class="selector-container" id="start-boss-chips">
                    <div class="level-chip active" onclick="setStartingLevel(1, this)">Recruit</div>
                    <div class="level-chip" onclick="setStartingLevel(2, this)">Phantom</div>
                    <div class="level-chip" onclick="setStartingLevel(3, this)">Titan</div>
                    <div class="level-chip" onclick="setStartingLevel(4, this)">Pulsar</div>
                    <div class="level-chip" onclick="setStartingLevel(5, this)">Knight</div>
                    <div class="level-chip" id="secret-boss-chip" style="display: none; color: var(--abyssal-purple); border-color: var(--abyssal-purple); box-shadow: 0 0 10px var(--abyssal-purple);" onclick="setStartingLevel(6, this)">Admin Pass</div>
                </div>
            </div>

            <button onclick="startGame()">Enter Arena</button>
            <button class="secondary-btn" onclick="showSettings()">Settings</button>
        </div>

        <div id="settings-screen" class="ui-overlay hidden">
            <div class="settings-modal">
                <h1 style="font-size: 1.5rem; color: var(--neon-green);">Arena Config</h1>
                
                <div class="setting-row">
                    <label>Challenge Boss:</label>
                    <select id="setting-start-level" onchange="syncLevelSelector(this.value)">
                        <option value="1">The Recruit</option>
                        <option value="2">The Phantom</option>
                        <option value="3">The Titan</option>
                        <option value="4">The Pulsar</option>
                        <option value="5">The Knight</option>
                        <option value="6" id="secret-boss-option" style="display: none;">Admin Pass</option>
                    </select>
                </div>

                <div class="setting-row"><label>Points to Level Up:</label><input type="number" id="pts-input" value="5" min="1" max="50"></div>
                <div class="setting-desc" style="font-size: 0.7rem; color: #666; margin-top: 10px;">Performance Tuning:</div>
                <div class="setting-row"><label>Dash Speed Mult:</label><input type="range" id="dash-range" min="1.1" max="5.0" step="0.05" value="1.75"><span id="dash-val" style="width: 40px; font-size: 0.8rem;">1.75x</span></div>
                <div class="setting-desc" style="font-size: 0.7rem; color: #666; margin-top: 10px;">Boss Stats Multipliers:</div>
                <div class="setting-row"><label>Boss AI Difficulty:</label><input type="range" id="diff-range" min="0.5" max="3.0" step="0.1" value="1.0"><span id="diff-val" style="width: 30px; font-size: 0.8rem;">1.0</span></div>
                <div class="setting-row"><label>Boss Size Scale:</label><input type="range" id="size-range" min="0.5" max="2.0" step="0.1" value="1.0"><span id="size-val" style="width: 30px; font-size: 0.8rem;">1.0</span></div>
                <div class="setting-row"><label>Base Ball Speed:</label><input type="number" id="ball-speed-input" value="12" step="0.5" min="4"></div>
                
                <p style="font-size: 0.8rem; color: #555; margin-top: 10px;">Win Score: <span id="win-score-preview">25</span></p>
                <button onclick="saveSettings()">Save & Close</button>
            </div>
        </div>

        <div id="pause-screen" class="ui-overlay hidden">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">Resume</button>
            <button class="secondary-btn" onclick="showSettings()">Settings</button>
            <button class="secondary-btn restart-btn" onclick="startGame()">Restart Arena</button>
        </div>

        <div id="game-over-screen" class="ui-overlay hidden">
            <h1 id="win-status">VICTORY</h1>
            <button onclick="startGame()">Play Again</button>
        </div>

        <canvas id="pong" width="1200" height="600"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
